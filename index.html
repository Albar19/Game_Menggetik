<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Vertical Typing Space Shooter - Type words to destroy aliens in this endless cyberpunk space shooter game.">
  <title>Typing Space Shooter</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <canvas id="gameCanvas"></canvas>

  <!-- Top-right Control Bar -->
  <div id="controlBar">
    <div class="ctrl-group">
      <label>LANG</label>
      <select id="langSelect" class="ctrl-select">
        <option value="en" selected>English</option>
        <option value="id">Indonesia</option>
      </select>
    </div>
    <div class="ctrl-group">
      <label>TARGET FPS</label>
      <select id="fpsSelect" class="ctrl-select">
        <option value="30">30</option>
        <option value="60" selected>60</option>
        <option value="120">120</option>
        <option value="144">144</option>
        <option value="0">Unlimited</option>
      </select>
    </div>
  </div>

<script src="js/main.js"></script>
</body>
</html>
